<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sondage — Votre avis compte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF7EC;
    --ink: #1A1413;
    --ink-soft: #6B5E59;
    --card: #FFFFFF;
    --line: #1A1413;
    --amazing: #7BD389;   /* vert */
    --amazing-ink: #0F3D1E;
    --meh: #F6C445;       /* jaune-orange */
    --meh-ink: #4A3100;
    --useless: #FF6B6B;   /* rouge corail */
    --useless-ink: #4A0E0E;
    --accent: #4A6CF7;    /* bleu */
  }
  [data-theme="neon"] {
    --bg: #0E0E14;
    --ink: #F5F3EE;
    --ink-soft: #9A93A6;
    --card: #1A1A24;
    --line: #F5F3EE;
    --amazing: #B6FF5C;
    --amazing-ink: #0E0E14;
    --meh: #FFD166;
    --meh-ink: #0E0E14;
    --useless: #FF5D8F;
    --useless-ink: #0E0E14;
    --accent: #7C5CFF;
  }
  [data-theme="pastel"] {
    --bg: #F2ECFF;
    --ink: #2A1F4A;
    --ink-soft: #6A5F8A;
    --card: #FFFFFF;
    --line: #2A1F4A;
    --amazing: #B8E6D2;
    --amazing-ink: #0F4A2E;
    --meh: #FFD6A5;
    --meh-ink: #5A3A0F;
    --useless: #FFB6C1;
    --useless-ink: #5A1A2A;
    --accent: #9B7EDE;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s ease, color 0.3s ease;
  }
  #root { min-height: 100vh; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .display { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

  /* Tweaks panel */
  .tweaks {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--card); color: var(--ink);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    z-index: 1000;
    box-shadow: 4px 4px 0 var(--line);
    min-width: 240px;
  }
  .tweaks h4 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
  .tweaks .row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .tweaks button {
    flex: 1; min-width: 60px;
    font-family: inherit; font-size: 11px;
    padding: 6px 8px;
    border: 1.5px solid var(--line);
    background: var(--bg); color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
  }
  .tweaks button.active { background: var(--ink); color: var(--bg); }
  .tweaks .label { color: var(--ink-soft); margin-bottom: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// Tweakable defaults — persisted by host
window.__TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "pastel",
  "layout": "cards",
  "buttonStyle": "chunky"
}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
